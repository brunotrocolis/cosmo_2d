<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cosmo 2D</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 0;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    #toolbar {
      width: 100%;
      padding: 8px 16px;
      background: #111;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #333;
    }
    #toolbar label {
      color: #aaa;
      font-family: sans-serif;
      font-size: 13px;
    }
    #scale-select {
      background: #2a2a2a;
      color: #fff;
      border: 1px solid #444;
      padding: 3px 10px;
      border-radius: 3px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }
    #game-wrapper {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <label for="scale-select">Escala:</label>
    <select id="scale-select">
      <option value="2">2x</option>
      <option value="4" selected>4x</option>
      <option value="6">6x</option>
      <option value="8">8x</option>
      <option value="10">10x</option>
    </select>
  </div>
  <div id="game-wrapper">
    <div id="game-container"></div>
  </div>
  <script type="module" src="./game.ts"></script>
</body>
</html>
